name: austin-testing
bot_name: "Lumina"
site_id: austin-testing
domain: www.austinmao.com
brand_root: brands/austin-testing/
operator:
  name: Austin Testing
  timezone: America/Denver
  contact: slack:#lumina-bot
  org: Austin Testing
template_version: v1.0.0
template_remote: https://github.com/austinmao/lumina-tenant-template
compatibility:
  gateway_version: "2026.3.13"
  required_soul_sections:
    - Who I Am
    - Core Principles
    - Boundaries
    - Communication Style
    - Security Rules
    - Memory
  skill_frontmatter_required:
    - name
    - description
    - permissions
config_policy:
  owned_key_prefixes:
    - agents.
    - skills.
  collision_mode: defer
cognition_registry:
  low/economy/low:
    model: gemini-2.5-flash-lite
  medium/standard/low:
    model: claude-sonnet-4-6
    fallback: deepseek/deepseek-v3
  high/premium/critical:
    model: claude-opus-4-6